name: Email reminders

on:
  schedule:
    # Every day at 13:00 UTC (~7am Mountain). Adjust as needed.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send reminders
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          ROSTER_EMAILS: ${{ secrets.ROSTER_EMAILS }}
          SMTP_SERVER: ${{ vars.SMTP_SERVER || 'smtp.gmail.com' }}
          APP_URL: ${{ vars.APP_URL || 'https://grantstec.github.io/BlueHorizon-Log/' }}
        run: python scripts/send_reminders.py
